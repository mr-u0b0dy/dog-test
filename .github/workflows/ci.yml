name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-translation-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docs-site dependencies
        working-directory: docs-site
        run: npm ci

      - name: Check docs translations
        working-directory: docs-site
        run: npm run check:translations

  host-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check tools/ tests/python/

      - name: Type check (mypy)
        run: mypy tools/ --ignore-missing-imports

      - name: Configure (host-debug)
        run: cmake --preset host-debug

      - name: Build (host-debug)
        run: cmake --build --preset host-debug

      - name: Run CTest suite
        run: ctest --preset host-debug --output-junit build/host-debug/ctest-results.xml

      - name: Run Python unit tests with coverage
        run: |
          python -m pytest tests/python/ -v --tb=short \
            --junitxml=build/host-debug/pytest-results.xml \
            --cov=tools --cov-report=xml:build/host-debug/coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            build/host-debug/ctest-results.xml
            build/host-debug/pytest-results.xml
            build/host-debug/coverage.xml
